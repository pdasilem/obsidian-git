name: test
on:
    push:
    pull_request:
jobs:
    svelte-check:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v5
            - uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: pnpm
            - uses: pnpm/action-setup@v4
              with:
                  version: latest
            - name: Install modules
              run: pnpm install
            - name: Run Svelte-Check
              run: pnpm run svelte
    lint:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v5
            - uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: pnpm
            - uses: pnpm/action-setup@v4
              with:
                  version: latest
            - name: Install modules
              run: pnpm install
            - name: Run ESLint
              run: pnpm run lint
    format:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v5
            - uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: pnpm
            - uses: pnpm/action-setup@v4
              with:
                  version: latest
            - name: Install modules
              run: pnpm install
            - name: Run Prettier
              run: pnpm run format
    compile:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v5
            - uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: pnpm
            - uses: pnpm/action-setup@v4
              with:
                  version: latest
            - name: Install modules
              run: pnpm install
            - name: Run tsc
              run: pnpm run tsc
    build:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v5
            - uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: pnpm
            - uses: pnpm/action-setup@v4
              with:
                  version: latest
            - name: Install modules
              run: pnpm install
            - name: Run build
              run: pnpm run build
